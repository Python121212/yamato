<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yamato Turret Debug</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: monospace; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: #00ffea; }
        #turret-selector { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 5px; pointer-events: auto; }
        .ui-btn { background: rgba(0, 40, 40, 0.8); border: 1px solid #00ffea; color: #00ffea; padding: 8px; cursor: pointer; text-align: left; }
        .active { background: #00ffea; color: #000; }
        #debug-log { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 10px; font-size: 10px; max-height: 200px; overflow-y: auto; pointer-events: auto; width: 200px; border: 1px solid #555; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; }
    </style>
</head>
<body>

    <div id="loading">ボーン解析中...</div>

    <div id="ui">
        <div id="debug-log">【ボーン名一覧】<br></div>
        <div id="turret-selector" id="btn-container">
            <button class="ui-btn active" id="btn-none">なし (自由視点)</button>
            <!-- ここに自動でボタンが増えます -->
        </div>
        <div style="position:absolute; bottom:20px; width:100%; text-align:center;">
            [ホイール] 旋回/ズーム | [F] 発射 | [X] 弾切替 | [W/A/S/D] 移動
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';

        let scene, camera, renderer, yamato;
        let speed = 0, camDist = 1000;
        const keys = {}, bullets = [];
        let turretBones = [];
        let activeIdx = -1;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 500000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            createStars();

            const manager = new THREE.LoadingManager();
            manager.setURLModifier(url => url.replace(/\+/g, '%2B'));
            const loader = new MMDLoader(manager);
            loader.setResourcePath('models/'); 

            loader.load('models/yamato.pmx', (mesh) => {
                yamato = mesh;
                scene.add(yamato);
                
                const logEl = document.getElementById('debug-log');
                const btnContainer = document.getElementById('turret-selector');

                // --- 【ボーン解析システム】 ---
                yamato.skeleton.bones.forEach((bone, index) => {
                    // 全ボーン名をログに出す
                    logEl.innerHTML += `${index}: ${bone.name}<br>`;
                    console.log(`ボーン[${index}]: ${bone.name}`);

                    // 「主砲」「副砲」「砲塔」「Turret」が含まれるボーンを自動登録
                    // ただし「砲身」など上下に動くボーンは除外（旋回用のみ）
                    const n = bone.name;
                    if ((n.includes("砲") || n.includes("Turret")) && !n.includes("身") && !n.includes("先")) {
                        const idx = turretBones.length;
                        turretBones.push(bone);

                        // ボタンを自動作成
                        const btn = document.createElement('button');
                        btn.className = 'ui-btn';
                        btn.innerText = n;
                        btn.onclick = () => {
                            activeIdx = idx;
                            document.querySelectorAll('.ui-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                        };
                        btnContainer.appendChild(btn);
                    }
                });

                document.getElementById('btn-none').onclick = () => {
                    activeIdx = -1;
                    document.querySelectorAll('.ui-btn').forEach(b => b.classList.remove('active'));
                    document.getElementById('btn-none').classList.add('active');
                };

                document.getElementById('loading').style.display = 'none';
            });

            // スクロール操作
            window.addEventListener('wheel', (e) => {
                if (activeIdx === -1) {
                    camDist += e.deltaY;
                } else if (turretBones[activeIdx]) {
                    // 砲塔を回転（感度を少し下げています）
                    turretBones[activeIdx].rotation.y -= e.deltaY * 0.0005;
                }
            });

            window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code==='KeyF') fire(); });
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function fire() {
            if (!yamato) return;
            const targets = (activeIdx === -1) ? turretBones : [turretBones[activeIdx]];
            targets.forEach(bone => {
                const geo = new THREE.CylinderGeometry(2, 2, 80, 8);
                geo.rotateX(Math.PI/2);
                const bullet = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color: 0x00ffff}));
                const worldPos = new THREE.Vector3();
                const worldQuat = new THREE.Quaternion();
                bone.getWorldPosition(worldPos);
                bone.getWorldQuaternion(worldQuat);
                bullet.position.copy(worldPos);
                bullet.quaternion.copy(worldQuat);
                bullet.userData.life = 100;
                bullets.push(bullet);
                scene.add(bullet);
            });
        }

        function createStars() {
            const v = [];
            for(let i=0; i<10000; i++) v.push(THREE.MathUtils.randFloatSpread(50000),THREE.MathUtils.randFloatSpread(50000),THREE.MathUtils.randFloatSpread(50000));
            const g = new THREE.BufferGeometry();
            g.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
            scene.add(new THREE.Points(g, new THREE.PointsMaterial({color:0xffffff, size:4})));
        }

        function animate() {
            requestAnimationFrame(animate);
            if (yamato) {
                if (keys['KeyW']) speed += 0.4;
                speed *= 0.96;
                yamato.translateZ(-speed);
                if (keys['KeyA']) yamato.rotation.y += 0.01;
                if (keys['KeyD']) yamato.rotation.y -= 0.01;

                if (activeIdx === -1) {
                    const offset = new THREE.Vector3(0, 300, camDist).applyMatrix4(yamato.matrixWorld);
                    camera.position.lerp(offset, 0.1);
                    camera.lookAt(yamato.position);
                } else {
                    const bone = turretBones[activeIdx];
                    const offset = new THREE.Vector3(0, 50, 150).applyMatrix4(bone.matrixWorld);
                    camera.position.lerp(offset, 0.2);
                    const look = new THREE.Vector3(0, 0, -1000).applyMatrix4(bone.matrixWorld);
                    camera.lookAt(look);
                }
            }
            for(let i=bullets.length-1; i>=0; i--) {
                bullets[i].translateZ(-60);
                if(--bullets[i].userData.life <= 0) { scene.remove(bullets[i]); bullets.splice(i,1); }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
