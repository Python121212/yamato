<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yamato Warship - Turret Control</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: #00ffea; }
        .touch-btn { pointer-events: auto; background: rgba(0, 255, 234, 0.1); border: 2px solid #00ffea; border-radius: 50%; display: flex; align-items: center; justify-content: center; user-select: none; }
        #actions { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 20px; align-items: flex-end; }
        #btn-fire { width: 90px; height: 90px; color: #00ccff; font-weight: bold; background: rgba(0, 204, 255, 0.2); pointer-events: auto; }
        #status { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 14px; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; }
    </style>
</head>
<body>

    <div id="loading">主砲システム同期中... <span id="progress">0%</span></div>

    <div id="ui-layer">
        <div id="status">マウス左右 / スワイプ：主砲旋回 | Fキー：ショックカノン発射</div>
        <div id="actions">
            <div id="btn-fire" class="touch-btn">FIRE</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';

        let scene, camera, renderer, yamato;
        let speed = 0;
        const keys = {};
        const bullets = [];
        
        // 主砲（ボーン）を格納する配列
        let turretBones = []; 
        let mouseX = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 500000);
            camera.position.set(0, 200, 800);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(500, 1000, 500);
            scene.add(sun);

            createStars();

            const manager = new THREE.LoadingManager();
            manager.setURLModifier(url => url.replace(/\+/g, '%2B'));
            const loader = new MMDLoader(manager);
            loader.setResourcePath('models/'); 

            loader.load('models/yamato.pmx', (mesh) => {
                yamato = mesh;
                scene.add(yamato);
                
                // --- 【ボーンの検索】 ---
                // モデルの中から「主砲」または「砲塔」という名前のボーンを探す
                yamato.skeleton.bones.forEach((bone) => {
                    if (bone.name.includes("主砲") || bone.name.includes("砲塔") || bone.name.includes("Turret")) {
                        // 砲身（上下に動くボーン）ではなく、回転する根元（親）だけを狙う
                        if (!bone.name.includes("砲身")) {
                            turretBones.push(bone);
                            console.log("主砲ボーンを発見:", bone.name);
                        }
                    }
                });

                document.getElementById('loading').style.display = 'none';
            }, (xhr) => {
                document.getElementById('progress').innerText = Math.round(xhr.loaded / xhr.total * 100) + "%";
            });

            // マウス移動で主砲を狙う
            window.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1; // -1 ～ 1
            });
            
            // キー入力
            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if(e.code === 'KeyF') fireCannon();
            });
            window.addEventListener('keyup', e => keys[e.code] = false);

            // 発射ボタン
            document.getElementById('btn-fire').addEventListener('mousedown', fireCannon);
            document.getElementById('btn-fire').addEventListener('touchstart', (e) => {
                e.preventDefault();
                fireCannon();
            });

            window.addEventListener('resize', onWindowResize);
        }

        // ショックカノン発射（全ての主砲から）
        function fireCannon() {
            if (!yamato || turretBones.length === 0) return;
            
            // 各主砲から弾を出す
            turretBones.forEach(bone => {
                const geo = new THREE.CylinderGeometry(2, 2, 60, 8);
                geo.rotateX(Math.PI / 2);
                const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
                const bullet = new THREE.Mesh(geo, mat);
                
                // ボーンの「世界座標（ワールド座標）」を取得する
                const worldPos = new THREE.Vector3();
                const worldQuat = new THREE.Quaternion();
                bone.getWorldPosition(worldPos);
                bone.getWorldQuaternion(worldQuat);
                
                bullet.position.copy(worldPos);
                bullet.quaternion.copy(worldQuat);
                
                // 弾を主砲の向きに合わせて少し前に出す
                bullet.translateZ(-50); 
                
                bullet.userData.life = 120;
                bullets.push(bullet);
                scene.add(bullet);
            });
        }

        function createStars() {
            const vertices = [];
            for (let i = 0; i < 10000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(60000));
                vertices.push(THREE.MathUtils.randFloatSpread(60000));
                vertices.push(THREE.MathUtils.randFloatSpread(60000));
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            scene.add(new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0xffffff, size: 5 })));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (yamato) {
                // 艦体の移動
                if (keys['Space']) speed += 0.4;
                speed *= 0.96; 
                yamato.translateZ(-speed);

                if (keys['ArrowLeft']) yamato.rotation.y += 0.02;
                if (keys['ArrowRight']) yamato.rotation.y -= 0.02;
                
                // --- 【主砲の旋回】 ---
                turretBones.forEach(bone => {
                    // マウスのX座標に合わせてボーンのY軸を回転させる
                    // ヤマト本体が回転しても、マウスの方向に追従するように調整
                    const targetRotation = -mouseX * Math.PI; 
                    bone.rotation.y = THREE.MathUtils.lerp(bone.rotation.y, targetRotation, 0.05);
                });

                // カメラの追従
                const cameraOffset = new THREE.Vector3(0, 150, 700).applyMatrix4(yamato.matrixWorld);
                camera.position.lerp(cameraOffset, 0.1);
                camera.lookAt(yamato.position);
            }

            // 弾の更新
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.translateZ(-40); // 弾速
                b.userData.life--;
                if (b.userData.life <= 0) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
