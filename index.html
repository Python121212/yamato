<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js MMD Yamato Loader</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000; /* 宇宙の基本の黒 */
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="info">
        宇宙戦艦ヤマト MMDローダーテスト<br>
        ・ドラッグ: カメラ回転<br>
        ・ホイール: ズーム
    </div>

    <!-- 1. Import maps を使ってライブラリのパスを定義 -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <!-- 2. メインの処理（ESモジュール） -->
    <script type="module">
        import * as THREE from 'three';
        import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;

        init();
        animate();

        function init() {
            // シーンの作成
            scene = new THREE.Scene();

            // 宇宙の背景（簡易的に星空を作る）
            createSpaceBackground();

            // カメラの設定（視野角, アスペクト比, ニア, ファー）
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.set(0, 30, 100); // 初期カメラ位置

            // レンダラーの設定
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true; // 影を有効化
            document.body.appendChild(renderer.domElement);

            // マウスでカメラを動かせるようにする（OrbitControls）
            controls = new OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 10, 0);
            controls.update();

            // ライティング（宇宙空間をイメージ）
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4); // 全体を薄暗く照らす
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2); // 主光源（太陽光のような強い光）
            dirLight.position.set(100, 100, 50);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // MMDモデル（.pmx）の読み込み
            const loader = new MMDLoader();
            const modelPath = 'models/yamato.pmx'; // 読み込むファイルのパス

            console.log('MMDモデルを読み込み中...');
            loader.load(
                modelPath,
                function (mesh) {
                    // 読み込み成功時の処理
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    scene.add(mesh);
                    console.log('読み込み成功！');
                },
                function (xhr) {
                    // 読み込み中の進捗表示
                    if (xhr.total > 0) {
                        const percent = Math.round((xhr.loaded / xhr.total) * 100);
                        console.log(`進行度: ${percent}%`);
                    }
                },
                function (error) {
                    // エラー時の処理
                    console.error('モデルの読み込みに失敗しました。パスやファイル名を確認してください。', error);
                }
            );

            // 画面サイズ変更への対応
            window.addEventListener('resize', onWindowResize);
        }

        // 簡易的な星空（パーティクル）を作る関数
        function createSpaceBackground() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 2000;
            const positions = new Float32Array(starsCount * 3);

            for (let i = 0; i < starsCount * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 1500; // 広範囲に星を散りばめる
            }

            starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5 });
            const starField = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(starField);
        }

        // ウィンドウのリサイズ処理
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ループ処理（描画）
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // カメラ操作の更新
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
