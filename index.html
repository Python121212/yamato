<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>宇宙戦艦ヤマト Web Game - テクスチャ完全修正版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #gui { position: absolute; top: 10px; left: 10px; color: #00ff00; font-family: monospace; pointer-events: none; text-shadow: 1px 1px 2px black; line-height: 1.4; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: sans-serif; text-align: center; }
    </style>
</head>
<body>
    <div id="loading">
        ヤマト最終調整中...<br>
        <span id="progress">0%</span>
    </div>
    <div id="gui">
        WASD: 移動 | 矢印キー: 旋回<br>
        SPACE: 加速 | SHIFT: 減速<br>
        Q: ズームアップ | E: ズームバック
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';

        let scene, camera, renderer, yamato;
        const keys = {};
        let speed = 0;
        let camDist = 1000; 
        let camHeight = 300;

        // モデルの場所
        const MODEL_PATH = 'models/yamato.pmx'; 

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 明るさを最大級に（テクスチャを確認しやすくするため）
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(500, 1000, 500);
            scene.add(sun);

            createStars();

            // --- 【重要】テクスチャのURLを自動修正するマネージャー ---
            const manager = new THREE.LoadingManager();
            manager.setURLModifier((url) => {
                // URLに + が含まれている場合、%2B に置き換えてサーバーに伝える
                if (url.includes('+')) {
                    console.log("URLを修正しました:", url);
                    return url.replace(/\+/g, '%2B');
                }
                return url;
            });

            const loader = new MMDLoader(manager);
            // リソースパスをモデルのあるフォルダに固定
            loader.setResourcePath('models/'); 

            loader.load(MODEL_PATH, (mesh) => {
                yamato = mesh;
                scene.add(yamato);
                document.getElementById('loading').style.display = 'none';
            }, 
            (xhr) => {
                const percent = Math.round(xhr.loaded / xhr.total * 100);
                document.getElementById('progress').innerText = percent + "%";
            }, 
            (error) => {
                console.error("読み込みエラー:", error);
            });

            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);
            window.addEventListener('resize', onWindowResize);
        }

        function createStars() {
            const vertices = [];
            for (let i = 0; i < 15000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(20000));
                vertices.push(THREE.MathUtils.randFloatSpread(20000));
                vertices.push(THREE.MathUtils.randFloatSpread(20000));
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            scene.add(new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0xffffff, size: 3 })));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (yamato) {
                if (keys['Space']) speed += 0.5;
                if (keys['ShiftLeft']) speed -= 0.5;
                speed *= 0.95; 
                yamato.translateZ(-speed);

                const rotS = 0.02;
                if (keys['ArrowLeft']) yamato.rotation.y += rotS;
                if (keys['ArrowRight']) yamato.rotation.y -= rotS;
                if (keys['ArrowUp']) yamato.rotation.x -= rotS * 0.5;
                if (keys['ArrowDown']) yamato.rotation.x += rotS * 0.5;
                
                if (keys['KeyA']) yamato.translateX(10);
                if (keys['KeyD']) yamato.translateX(-10);
                if (keys['KeyW']) yamato.translateY(10);
                if (keys['KeyS']) yamato.translateY(-10);

                if (keys['KeyQ']) { camDist -= 20; camHeight -= 5; }
                if (keys['KeyE']) { camDist += 20; camHeight += 5; }
                camDist = Math.max(100, camDist);

                const relativeOffset = new THREE.Vector3(0, camHeight, camDist);
                const cameraOffset = relativeOffset.applyMatrix4(yamato.matrixWorld);
                camera.position.lerp(cameraOffset, 0.1);
                camera.lookAt(yamato.position);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
