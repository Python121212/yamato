<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Space Battleship Yamato Web Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #info {
            position: absolute; top: 10px; left: 10px; color: white;
            font-family: sans-serif; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">WASD: 移動 / 矢印: 回転 / Space: 加速</div>

    <!-- Three.js と MMDLoader の読み込み -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';

        let scene, camera, renderer, yamato;
        const keys = {};

        init();
        animate();

        function init() {
            // 1. シーンの作成
            scene = new THREE.Scene();

            // 2. カメラの作成
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 20000);
            camera.position.set(0, 5, 20);

            // 3. レンダラー
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 4. 光源
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(10, 10, 10);
            scene.add(directionalLight);

            // 5. 宇宙の星空（背景）
            createStars();

            // 6. MMDモデル（ヤマト）の読み込み
            const loader = new MMDLoader();
            // モデルのパスを自分のファイル名に合わせて変更してください
            loader.load('models/yamato.pmx', (mesh) => {
                yamato = mesh;
                scene.add(yamato);
            }, onProgress, onError);

            // 7. 入力イベント
            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);
            window.addEventListener('resize', onWindowResize);
        }

        // 星空を作る関数
        function createStars() {
            const vertices = [];
            for (let i = 0; i < 5000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(2000)); // x
                vertices.push(THREE.MathUtils.randFloatSpread(2000)); // y
                vertices.push(THREE.MathUtils.randFloatSpread(2000)); // z
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            const material = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 });
            const points = new THREE.Points(geometry, material);
            scene.add(points);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onProgress(xhr) { console.log((xhr.loaded / xhr.total * 100) + '% loaded'); }
        function onError(e) { console.error('エラーが発生しました', e); }

        // メインループ
        function animate() {
            requestAnimationFrame(animate);

            if (yamato) {
                // 移動ロジック
                const speed = keys['Space'] ? 1.0 : 0.2;
                
                // 回転（矢印キー）
                if (keys['ArrowLeft']) yamato.rotation.y += 0.02;
                if (keys['ArrowRight']) yamato.rotation.y -= 0.02;
                if (keys['ArrowUp']) yamato.rotation.x -= 0.01;
                if (keys['ArrowDown']) yamato.rotation.x += 0.01;

                // 前進（Wキーなど、モデルの向きに合わせて調整）
                if (keys['KeyW']) {
                    yamato.translateZ(-speed);
                }

                // カメラをヤマトの後ろに追従させる
                const relativeCameraOffset = new THREE.Vector3(0, 5, 20);
                const cameraOffset = relativeCameraOffset.applyMatrix4(yamato.matrixWorld);
                camera.position.lerp(cameraOffset, 0.1);
                camera.lookAt(yamato.position);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
