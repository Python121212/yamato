<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yamato Space Warfare</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }

        /* ゲームUI全体のレイアウト */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* 下の3Dを触れるようにする */
            color: #00ffea;
        }
        .touch-btn {
            pointer-events: auto; /* ボタンは触れるようにする */
            background: rgba(0, 255, 234, 0.1);
            border: 2px solid #00ffea;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .touch-btn:active { background: rgba(0, 255, 234, 0.4); }

        /* レーダー (左上) */
        #radar {
            position: absolute; top: 20px; left: 20px; width: 100px; height: 100px;
            border-radius: 50%; border: 1px solid #00ffea; background: rgba(0, 50, 50, 0.5);
        }

        /* 十字キー (左下) */
        #d-pad {
            position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px;
        }
        #btn-up    { position: absolute; top: 0; left: 50px; width: 50px; height: 50px; }
        #btn-down  { position: absolute; bottom: 0; left: 50px; width: 50px; height: 50px; }
        #btn-left  { position: absolute; left: 0; top: 50px; width: 50px; height: 50px; }
        #btn-right { position: absolute; right: 0; top: 50px; width: 50px; height: 50px; }

        /* 攻撃ボタン・速度 (右下) */
        #actions {
            position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 20px;
        }
        #btn-fire { width: 80px; height: 80px; font-weight: bold; font-size: 14px; border-color: #ff3c00; color: #ff3c00; }
        #btn-boost { width: 60px; height: 60px; font-size: 12px; }

        /* 体力・速度ゲージ (中央下) */
        #status-bar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 250px; text-align: center; pointer-events: none;
        }
        #hp-bar { width: 100%; height: 10px; background: #333; border: 1px solid #00ffea; }
        #hp-fill { width: 100%; height: 100%; background: #00ffea; }
        
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; }
    </style>
</head>
<body>

    <div id="loading">SYSTEM LOADING... <span id="progress">0%</span></div>

    <!-- UI レイヤー -->
    <div id="ui-layer">
        <div id="radar"></div>
        
        <div id="d-pad">
            <div id="btn-up" class="touch-btn">▲</div>
            <div id="btn-down" class="touch-btn">▼</div>
            <div id="btn-left" class="touch-btn">◀</div>
            <div id="btn-right" class="touch-btn">▶</div>
        </div>

        <div id="actions">
            <div id="btn-fire" class="touch-btn">主砲発射</div>
            <div id="btn-boost" class="touch-btn">加速</div>
        </div>

        <div id="status-bar">
            SPEED: <span id="speed-val">0</span>km/h
            <div id="hp-bar"><div id="hp-fill"></div></div>
            YAMATO HULL INTEGRITY
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';

        let scene, camera, renderer, yamato;
        const keys = {};
        let speed = 0;
        let camDist = 1200;
        let camHeight = 400;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(500, 1000, 500);
            scene.add(sun);

            createStars();

            // MMD読み込みとURL修正
            const manager = new THREE.LoadingManager();
            manager.setURLModifier(url => url.replace(/\+/g, '%2B'));
            const loader = new MMDLoader(manager);
            loader.setResourcePath('models/'); 

            loader.load('models/yamato.pmx', (mesh) => {
                yamato = mesh;
                scene.add(yamato);
                document.getElementById('loading').style.display = 'none';
            }, (xhr) => {
                document.getElementById('progress').innerText = Math.round(xhr.loaded / xhr.total * 100) + "%";
            });

            // --- 入力イベント (PC & スマホ) ---
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            
            // スマホボタンの設定
            setupButton('btn-up', 'ArrowUp');
            setupButton('btn-down', 'ArrowDown');
            setupButton('btn-left', 'ArrowLeft');
            setupButton('btn-right', 'ArrowRight');
            setupButton('btn-boost', 'Space');
            setupButton('btn-fire', 'KeyF');

            window.addEventListener('resize', onWindowResize);
        }

        function setupButton(id, keyName) {
            const btn = document.getElementById(id);
            const start = (e) => { e.preventDefault(); keys[keyName] = true; };
            const end = (e) => { e.preventDefault(); keys[keyName] = false; };
            btn.addEventListener('touchstart', start);
            btn.addEventListener('touchend', end);
            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', end);
        }

        function createStars() {
            const vertices = [];
            for (let i = 0; i < 10000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(50000));
                vertices.push(THREE.MathUtils.randFloatSpread(50000));
                vertices.push(THREE.MathUtils.randFloatSpread(50000));
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            scene.add(new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0xffffff, size: 4 })));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (yamato) {
                // 速度
                if (keys['Space']) speed += 0.4;
                speed *= 0.96; 
                yamato.translateZ(-speed);

                // 回転
                if (keys['ArrowLeft']) yamato.rotation.y += 0.02;
                if (keys['ArrowRight']) yamato.rotation.y -= 0.02;
                if (keys['ArrowUp']) yamato.rotation.x -= 0.01;
                if (keys['ArrowDown']) yamato.rotation.x += 0.01;
                
                // カメラ追従
                const relativeOffset = new THREE.Vector3(0, camHeight, camDist);
                const cameraOffset = relativeOffset.applyMatrix4(yamato.matrixWorld);
                camera.position.lerp(cameraOffset, 0.1);
                camera.lookAt(yamato.position);

                // UIの更新
                document.getElementById('speed-val').innerText = Math.round(speed * 10);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
