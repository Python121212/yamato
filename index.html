<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>宇宙戦艦ヤマト - テクスチャ強制表示版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #gui { position: absolute; top: 10px; left: 10px; color: #00ff00; font-family: monospace; pointer-events: none; text-shadow: 1px 1px 2px black; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: sans-serif; text-align: center; }
    </style>
</head>
<body>
    <div id="loading">ヤマト発進準備中...<br><span id="progress">0%</span></div>
    <div id="gui">
        WASD: 移動 | 矢印: 旋回 | SPACE: 加速<br>
        Q/E: ズームアップ・バック
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';

        let scene, camera, renderer, yamato;
        const keys = {};
        let speed = 0, camDist = 1000, camHeight = 300;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 500000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 光源をかなり強く設定
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const sun = new THREE.DirectionalLight(0xffffff, 2.0);
            sun.position.set(500, 1000, 500);
            scene.add(sun);

            createStars();

            const loader = new MMDLoader();
            // テクスチャのベースパスを強制指定
            loader.setResourcePath('models/'); 

            loader.load('models/yamato.pmx', (mesh) => {
                yamato = mesh;

                // --- 【消えているパーツを強制的に表示させる処理】 ---
                yamato.traverse(function (child) {
                    if (child.isMesh) {
                        child.material.forEach(mat => {
                            // テクスチャが読み込めていない(null)場合でも透明にしない
                            if (!mat.map) {
                                mat.color.setHex(0x666666); // 画像がないパーツを灰色にする
                            }
                            mat.transparent = false;  // 透明設定をオフにする
                            mat.opacity = 1.0;        // 不透明度を最大にする
                            mat.side = THREE.DoubleSide; // 裏側も表示する
                        });
                    }
                });

                scene.add(yamato);
                document.getElementById('loading').style.display = 'none';
            }, 
            (xhr) => {
                const percent = Math.round(xhr.loaded / xhr.total * 100);
                document.getElementById('progress').innerText = percent + "%";
            }, 
            (error) => {
                console.error("読み込みエラー:", error);
            });

            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);
            window.addEventListener('resize', onWindowResize);
        }

        function createStars() {
            const vertices = [];
            for (let i = 0; i < 15000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(50000));
                vertices.push(THREE.MathUtils.randFloatSpread(50000));
                vertices.push(THREE.MathUtils.randFloatSpread(50000));
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            scene.add(new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0xffffff, size: 4 })));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (yamato) {
                if (keys['Space']) speed += 0.5;
                if (keys['ShiftLeft']) speed -= 0.5;
                speed *= 0.96; 
                yamato.translateZ(-speed);

                const rotS = 0.02;
                if (keys['ArrowLeft']) yamato.rotation.y += rotS;
                if (keys['ArrowRight']) yamato.rotation.y -= rotS;
                if (keys['ArrowUp']) yamato.rotation.x -= rotS * 0.5;
                if (keys['ArrowDown']) yamato.rotation.x += rotS * 0.5;
                
                if (keys['KeyA']) yamato.translateX(10);
                if (keys['KeyD']) yamato.translateX(-10);
                if (keys['KeyW']) yamato.translateY(10);
                if (keys['KeyS']) yamato.translateY(-10);

                if (keys['KeyQ']) { camDist -= 20; camHeight -= 5; }
                if (keys['KeyE']) { camDist += 20; camHeight += 5; }
                camDist = Math.max(100, camDist);

                const relativeOffset = new THREE.Vector3(0, camHeight, camDist);
                const cameraOffset = relativeOffset.applyMatrix4(yamato.matrixWorld);
                camera.position.lerp(cameraOffset, 0.1);
                camera.lookAt(yamato.position);
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
