<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Battleship Yamato Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #gui { position: absolute; top: 10px; left: 10px; color: #00ff00; font-family: monospace; pointer-events: none; text-shadow: 1px 1px 2px black; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: sans-serif; font-size: 20px; }
    </style>
</head>
<body>
    <div id="loading">ヤマト発進準備中...</div>
    <div id="gui">
        WASD: 移動 | 矢印キー: 旋回<br>
        SPACE: 加速 | SHIFT: 減速
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';

        let scene, camera, renderer, yamato;
        const keys = {};
        let speed = 0;

        init();
        animate();

        function init() {
            // シーン
            scene = new THREE.Scene();

            // カメラ (少し遠目に配置)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 50000);
            camera.position.set(0, 50, 150);

            // レンダラー
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 光源 (宇宙なので強めに)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(100, 100, 100);
            scene.add(sun);

            // 宇宙の星
            createStars();

            // MMDローダー
            const loader = new MMDLoader();
            
            // テクスチャ読み込みエラーで止まらないための設定
            loader.load('models/yamato.pmx', (mesh) => {
                yamato = mesh;
                
                // ヤマトが巨大すぎる場合があるのでサイズ調整（必要に応じて変更）
                // yamato.scale.set(10, 10, 10); 
                
                scene.add(yamato);
                document.getElementById('loading').style.display = 'none';
                console.log("ヤマト 読み込み完了");
            }, 
            (xhr) => {
                const percent = Math.round(xhr.loaded / xhr.total * 100);
                document.getElementById('loading').innerText = `読み込み中: ${percent}%`;
            }, 
            (error) => {
                console.error("読み込みエラーが発生しましたが、続行を試みます:", error);
                // エラーが出ても「読み込み中」表示を消す
                document.getElementById('loading').style.display = 'none';
            });

            // 入力管理
            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);
            window.addEventListener('resize', onWindowResize);
        }

        function createStars() {
            const vertices = [];
            for (let i = 0; i < 10000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(5000));
                vertices.push(THREE.MathUtils.randFloatSpread(5000));
                vertices.push(THREE.MathUtils.randFloatSpread(5000));
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            const material = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5 });
            scene.add(new THREE.Points(geometry, material));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (yamato) {
                // 加速・減速
                if (keys['Space']) speed += 0.05;
                if (keys['ShiftLeft']) speed -= 0.05;
                speed *= 0.98; // 摩擦的な減速

                // 前進移動
                yamato.translateZ(-speed);

                // 回転（旋回）
                if (keys['ArrowLeft']) yamato.rotation.y += 0.02;
                if (keys['ArrowRight']) yamato.rotation.y -= 0.02;
                if (keys['ArrowUp']) yamato.rotation.x -= 0.01;
                if (keys['ArrowDown']) yamato.rotation.x += 0.01;
                
                // 左右移動 (A, D)
                if (keys['KeyA']) yamato.translateX(speed + 0.5);
                if (keys['KeyD']) yamato.translateX(-(speed + 0.5));
                if (keys['KeyW']) yamato.translateY(-0.5);
                if (keys['KeyS']) yamato.translateY(0.5);

                // カメラの追従
                const relativeCameraOffset = new THREE.Vector3(0, 30, 150);
                const cameraOffset = relativeCameraOffset.applyMatrix4(yamato.matrixWorld);
                camera.position.lerp(cameraOffset, 0.1);
                camera.lookAt(yamato.position);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
