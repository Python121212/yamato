<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yamato Space Warfare - Combat Version</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; }

        /* UI全体 */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: #00ffea; text-shadow: 0 0 5px #000; }
        .touch-btn {
            pointer-events: auto; background: rgba(0, 255, 234, 0.1);
            border: 2px solid #00ffea; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .touch-btn:active { background: rgba(0, 255, 234, 0.4); }

        /* 左上：視点・レーダー */
        #top-left { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; }
        #btn-view { width: 70px; height: 70px; border-radius: 10px; font-size: 12px; text-align: center; }

        /* 左下：移動 */
        #d-pad { position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px; }
        #btn-up { position: absolute; top: 0; left: 50px; width: 50px; height: 50px; }
        #btn-down { position: absolute; bottom: 0; left: 50px; width: 50px; height: 50px; }
        #btn-left { position: absolute; left: 0; top: 50px; width: 50px; height: 50px; }
        #btn-right { position: absolute; right: 0; top: 50px; width: 50px; height: 50px; }

        /* 右下：攻撃・加速 */
        #actions { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 20px; align-items: flex-end; }
        #btn-fire { width: 90px; height: 90px; border-color: #00ccff; color: #00ccff; font-weight: bold; background: rgba(0, 204, 255, 0.2); }
        #btn-boost { width: 70px; height: 70px; }

        /* ステータス */
        #status { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center; }
        #hp-bar { width: 200px; height: 8px; background: #222; border: 1px solid #00ffea; margin-top: 5px; }
        #hp-fill { width: 100%; height: 100%; background: #00ffea; }

        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; }
    </style>
</head>
<body>

    <div id="loading">波動エンジン始動中... <span id="progress">0%</span></div>

    <div id="ui-layer">
        <div id="top-left">
            <div id="btn-view" class="touch-btn">視点切替<br>(V)</div>
        </div>
        
        <div id="d-pad">
            <div id="btn-up" class="touch-btn">▲</div>
            <div id="btn-down" class="touch-btn">▼</div>
            <div id="btn-left" class="touch-btn">◀</div>
            <div id="btn-right" class="touch-btn">▶</div>
        </div>

        <div id="actions">
            <div id="btn-fire" class="touch-btn">ショック<br>カノン(F)</div>
            <div id="btn-boost" class="touch-btn">加速</div>
        </div>

        <div id="status">
            <span id="speed-text">0</span> cosmo/h
            <div id="hp-bar"><div id="hp-fill"></div></div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';

        let scene, camera, renderer, yamato;
        let speed = 0;
        const keys = {};
        const bullets = []; // 弾を管理する配列
        
        // 視点管理
        let viewMode = 0; // 0:後方, 1:真上, 2:艦橋
        const cameraSettings = [
            { pos: new THREE.Vector3(0, 150, 600), look: 100 },  // 後方
            { pos: new THREE.Vector3(0, 1000, 100), look: 0 },   // 真上
            { pos: new THREE.Vector3(0, 80, -50), look: -500 }   // 艦橋風
        ];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 500000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(500, 1000, 500);
            scene.add(sun);

            createStars();

            const manager = new THREE.LoadingManager();
            manager.setURLModifier(url => url.replace(/\+/g, '%2B'));
            const loader = new MMDLoader(manager);
            loader.setResourcePath('models/'); 

            loader.load('models/yamato.pmx', (mesh) => {
                yamato = mesh;
                scene.add(yamato);
                document.getElementById('loading').style.display = 'none';
            }, (xhr) => {
                document.getElementById('progress').innerText = Math.round(xhr.loaded / xhr.total * 100) + "%";
            });

            // キー入力
            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if(e.code === 'KeyV') switchView();
                if(e.code === 'KeyF') fireCannon();
            });
            window.addEventListener('keyup', e => keys[e.code] = false);
            
            // ボタン設定
            setupButton('btn-up', 'ArrowUp'); setupButton('btn-down', 'ArrowDown');
            setupButton('btn-left', 'ArrowLeft'); setupButton('btn-right', 'ArrowRight');
            setupButton('btn-boost', 'Space');
            
            document.getElementById('btn-view').addEventListener('mousedown', switchView);
            document.getElementById('btn-view').addEventListener('touchstart', (e) => { e.preventDefault(); switchView(); });
            document.getElementById('btn-fire').addEventListener('mousedown', fireCannon);
            document.getElementById('btn-fire').addEventListener('touchstart', (e) => { e.preventDefault(); fireCannon(); });

            window.addEventListener('resize', onWindowResize);
        }

        function setupButton(id, keyName) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyName] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyName] = false; });
            btn.addEventListener('mousedown', () => keys[keyName] = true);
            btn.addEventListener('mouseup', () => keys[keyName] = false);
        }

        // 視点切り替え
        function switchView() {
            viewMode = (viewMode + 1) % cameraSettings.length;
        }

        // ショックカノン発射
        function fireCannon() {
            if (!yamato) return;
            
            // 弾の形状と色
            const geo = new THREE.CylinderGeometry(2, 2, 40, 8);
            geo.rotateX(Math.PI / 2); // 向きを前方に倒す
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            
            const bullet = new THREE.Mesh(geo, mat);
            
            // ヤマトの現在の位置と向きをコピー
            bullet.position.copy(yamato.position);
            bullet.rotation.copy(yamato.rotation);
            
            // 少し前方にオフセットして出現させる
            bullet.translateZ(-150);
            
            bullet.userData.life = 100; // 100フレームで消える
            bullets.push(bullet);
            scene.add(bullet);
        }

        function createStars() {
            const vertices = [];
            for (let i = 0; i < 10000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(60000));
                vertices.push(THREE.MathUtils.randFloatSpread(60000));
                vertices.push(THREE.MathUtils.randFloatSpread(60000));
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            scene.add(new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0xffffff, size: 5 })));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (yamato) {
                // 移動・旋回
                if (keys['Space']) speed += 0.5;
                speed *= 0.96; 
                yamato.translateZ(-speed);

                if (keys['ArrowLeft']) yamato.rotation.y += 0.02;
                if (keys['ArrowRight']) yamato.rotation.y -= 0.02;
                if (keys['ArrowUp']) yamato.rotation.x -= 0.01;
                if (keys['ArrowDown']) yamato.rotation.x += 0.01;
                
                // カメラの追従
                const config = cameraSettings[viewMode];
                const cameraOffset = config.pos.clone().applyMatrix4(yamato.matrixWorld);
                camera.position.lerp(cameraOffset, 0.1);
                
                // 注視点
                const lookAtPos = new THREE.Vector3(0, 0, -config.look).applyMatrix4(yamato.matrixWorld);
                camera.lookAt(lookAtPos);

                document.getElementById('speed-text').innerText = Math.round(speed * 20);
            }

            // 弾の移動と削除
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.translateZ(-30); // 弾のスピード
                b.userData.life--;
                if (b.userData.life <= 0) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
