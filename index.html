<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Yamato - Fire Control System v3</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #00ffea; font-family: 'Share Tech Mono', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* 砲塔選択パネル */
        #selector { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 8px; pointer-events: auto; }
        .ui-btn { background: rgba(0, 40, 40, 0.9); border: 1px solid #00ffea; color: #00ffea; padding: 12px; cursor: pointer; width: 160px; text-align: left; font-size: 14px; transition: 0.2s; border-radius: 4px; }
        .ui-btn:hover { background: rgba(0, 255, 234, 0.3); }
        .active { background: #00ffea !important; color: #000 !important; font-weight: bold; box-shadow: 0 0 20px #00ffea; }

        /* 照準器 */
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; border: 2px solid rgba(0, 255, 234, 0.8); border-radius: 50%; pointer-events: none; }
        #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #00ffea; transform: translate(-50%, -50%); border-radius: 50%; }

        /* 弾種・ステータス表示 */
        #hud-bottom { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; width: 500px; padding: 15px; border-top: 2px solid #00ffea; background: rgba(0,0,0,0.6); }
        #ammo-name { font-size: 32px; font-weight: bold; letter-spacing: 4px; }
        #help { font-size: 11px; color: #888; margin-top: 8px; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; }
    </style>
</head>
<body>

<div id="loading">火器管制システム 解析中...</div>

<div id="ui">
    <div id="crosshair"></div>
    <div id="selector">
        <button class="ui-btn active" id="btn-none" onclick="setTurret(-1)">操艦モード</button>
        <!-- 指定の砲塔ボタン -->
    </div>
    <div id="hud-bottom">
        <div id="ammo-name">SHOCK CANNON</div>
        <div id="help">
            [マウス移動] 旋回・仰角連動エイム | [ホイール] ズーム調整 | [X] 弾種切替 | [F] 発射 | [W/A/S/D] 操艦
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';

    let scene, camera, renderer, yamato;
    let speed = 0, camDist = 2000;
    let mouseX = 0, mouseY = 0;
    const keys = {}, bullets = [];
    
    let turrets = []; 
    let activeIdx = -1;
    let ammoType = 0; // 0:Shock, 1:Type3

    // ご要望の指定5砲塔
    const targetNames = ["第一主砲", "第二主砲", "第一副砲", "第二副砲", "第四主砲"];

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(1000, 2000, 1000);
        scene.add(sun);

        createStars();

        const manager = new THREE.LoadingManager();
        manager.setURLModifier(url => url.replace(/\+/g, '%2B'));
        const loader = new MMDLoader(manager);
        loader.setResourcePath('models/'); 

        loader.load('models/yamato.pmx', (mesh) => {
            yamato = mesh;
            yamato.scale.set(25, 25, 25);
            scene.add(yamato);
            
            const btnContainer = document.getElementById('selector');

            // --- 【ボーン精密スキャン】 ---
            targetNames.forEach(name => {
                // 砲塔の根元(Base)
                const base = yamato.skeleton.bones.find(b => b.name.includes(name) && !b.name.includes("身") && !b.name.includes("先"));
                if (base) {
                    // 全砲身(Barrels) - 3門一斉用
                    const barrels = yamato.skeleton.bones.filter(b => b.name.includes(name) && b.name.includes("身"));
                    
                    const idx = turrets.length;
                    turrets.push({ base, barrels, name });

                    // UIボタン生成
                    const btn = document.createElement('button');
                    btn.className = 'ui-btn';
                    btn.innerText = name;
                    btn.onclick = () => {
                        activeIdx = idx;
                        document.querySelectorAll('.ui-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    };
                    btnContainer.appendChild(btn);
                }
            });

            window.setTurret = (idx) => {
                activeIdx = idx;
                document.querySelectorAll('.ui-btn').forEach(b => b.classList.remove('active'));
                if(idx === -1) document.getElementById('btn-none').classList.add('active');
            };

            document.getElementById('loading').style.display = 'none';
        });

        // マウス移動（視点の動きで砲塔を斜めに動かす）
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1; // -1 (左) to 1 (右)
            mouseY = (e.clientY / window.innerHeight) * 2 - 1; // -1 (上) to 1 (下)
        });

        window.addEventListener('wheel', (e) => {
            camDist += e.deltaY * 2;
            camDist = Math.max(200, Math.min(10000, camDist));
        }, { passive: true });

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'KeyX') switchAmmo();
            if(e.code === 'KeyF') fire();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
    }

    function switchAmmo() {
        ammoType = (ammoType + 1) % 2;
        const el = document.getElementById('ammo-name');
        el.innerText = ammoType === 0 ? "SHOCK CANNON" : "TYPE-3 FUSION";
        el.style.color = ammoType === 0 ? "#00ffff" : "#ffaa00";
    }

    function fire() {
        if (!yamato) return;
        const activeTurrets = activeIdx === -1 ? turrets : [turrets[activeIdx]];
        
        activeTurrets.forEach(t => {
            const points = t.barrels.length > 0 ? t.barrels : [t.base];
            points.forEach(p => {
                const isShock = (ammoType === 0);
                const geo = isShock ? new THREE.CylinderGeometry(10, 10, 500, 8) : new THREE.SphereGeometry(25, 12, 12);
                if(isShock) geo.rotateX(Math.PI/2);
                
                const bullet = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
                    color: isShock ? 0x00ffff : 0xffaa00,
                    emissive: isShock ? 0x00ffff : 0xffaa00,
                    transparent: true, opacity: 0.9
                }));
                
                const worldPos = new THREE.Vector3();
                const worldQuat = new THREE.Quaternion();
                p.getWorldPosition(worldPos);
                p.getWorldQuaternion(worldQuat);
                
                bullet.position.copy(worldPos);
                bullet.quaternion.copy(worldQuat);
                bullet.userData = { life: 150, velocity: isShock ? 400 : 180, type: ammoType };
                
                bullets.push(bullet);
                scene.add(bullet);
            });
        });
    }

    function createStars() {
        const v = [];
        for(let i=0; i<20000; i++) v.push(THREE.MathUtils.randFloatSpread(800000),THREE.MathUtils.randFloatSpread(800000),THREE.MathUtils.randFloatSpread(800000));
        const g = new THREE.BufferGeometry();
        g.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
        scene.add(new THREE.Points(g, new THREE.PointsMaterial({color:0xffffff, size:18})));
    }

    function animate() {
        requestAnimationFrame(animate);
        if (yamato) {
            // ヤマト本体の移動
            if (keys['KeyW']) speed += 1.5;
            if (keys['KeyS']) speed -= 1.2;
            speed *= 0.96;
            yamato.translateZ(-speed);
            if (keys['KeyA']) yamato.rotation.y += 0.01;
            if (keys['KeyD']) yamato.rotation.y -= 0.01;

            // --- 【視点と砲塔の連動エイム】 ---
            if (activeIdx !== -1 && turrets[activeIdx]) {
                const t = turrets[activeIdx];
                
                // 旋回(左右): マウスXに追従
                const targetYaw = -mouseX * Math.PI * 0.7;
                t.base.rotation.y = THREE.MathUtils.lerp(t.base.rotation.y, targetYaw, 0.05);

                // 仰角(上下): マウスYに全砲身が連動
                const targetPitch = -mouseY * 0.8; 
                t.barrels.forEach(b => {
                    b.rotation.x = THREE.MathUtils.lerp(b.rotation.x, targetPitch, 0.08);
                });
            }

            // --- 【カメラ制御】 ---
            if (activeIdx === -1) {
                // 自由操艦視点
                const offset = new THREE.Vector3(0, 500, camDist).applyMatrix4(yamato.matrixWorld);
                camera.position.lerp(offset, 0.1);
                camera.lookAt(yamato.position);
            } else {
                // 砲塔連動視点（FPD）
                const base = turrets[activeIdx].base;
                // 砲塔の背後にカメラを配置
                const offset = new THREE.Vector3(0, 150, 600).applyMatrix4(base.matrixWorld);
                camera.position.lerp(offset, 0.1);
                
                // 照準の先を見る（斜め方向への追従）
                const lookTarget = new THREE.Vector3(-mouseX * 1000, -mouseY * 1000, -5000).applyMatrix4(base.matrixWorld);
                camera.lookAt(lookTarget);
            }
        }
        
        // 弾道更新
        for(let i=bullets.length-1; i>=0; i--) {
            const b = bullets[i];
            b.translateZ(-b.userData.velocity);
            if(b.userData.type === 1) b.position.y -= 3; // 三式弾は重力落下
            if(--b.userData.life <= 0) { scene.remove(b); bullets.splice(i,1); }
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
