<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yamato Tactical Control System</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Share Tech Mono', monospace; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: #00ffea; }
        
        /* 砲塔選択ボタン（上部） */
        #turret-selector { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; pointer-events: auto; }
        .t-btn { padding: 10px 15px; background: rgba(0, 40, 40, 0.7); border: 1px solid #00ffea; color: #00ffea; cursor: pointer; font-size: 12px; }
        .t-btn.active { background: #00ffea; color: #000; font-weight: bold; }

        /* 武器切り替え（右下） */
        #weapon-system { position: absolute; bottom: 40px; right: 20px; pointer-events: auto; display: flex; flex-direction: column; gap: 10px; }
        .w-btn { width: 150px; padding: 15px; background: rgba(255, 100, 0, 0.2); border: 1px solid #ff6a00; color: #ff6a00; cursor: pointer; text-align: center; }
        .w-btn.selected { background: #ff6a00; color: #fff; box-shadow: 0 0 15px #ff6a00; }
        .w-btn.blue { border-color: #00ccff; color: #00ccff; }
        .w-btn.blue.selected { background: #00ccff; color: #fff; box-shadow: 0 0 15px #00ccff; }

        #fire-btn { width: 150px; height: 60px; background: rgba(255,0,0,0.3); border: 2px solid red; color: white; font-weight: bold; margin-top: 10px; cursor: pointer; }

        #info { position: absolute; bottom: 20px; left: 20px; font-size: 12px; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; }
    </style>
</head>
<body>

    <div id="loading">タクティカルモード起動中... <span id="progress">0%</span></div>

    <div id="ui-layer">
        <div id="turret-selector">
            <button class="t-btn" data-id="1">第一主砲</button>
            <button class="t-btn" data-id="2">第二主砲</button>
            <button class="t-btn" data-id="3">第三主砲</button>
            <button class="t-btn" data-id="sec1">第一副砲</button>
            <button class="t-btn" data-id="sec2">第二副砲</button>
            <button class="t-btn" id="btn-clear">選択解除</button>
        </div>

        <div id="weapon-system">
            <div class="w-btn blue selected" id="w-shock">ショックカノン</div>
            <div class="w-btn" id="w-fusion">三式融合弾</div>
            <button id="fire-btn">FIRE (F)</button>
        </div>

        <div id="info">
            砲塔選択中：スクロールで仰角操作 / マウスで旋回<br>
            未選択時：スクロールでズーム
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';

        let scene, camera, renderer, yamato;
        let speed = 0, camDist = 1000;
        const keys = {};
        const bullets = [];
        
        let selectedTurret = null; // 現在選択中の砲塔
        let weaponType = 'shock'; // shock or fusion
        let mouseX = 0;

        // 砲塔と砲身のボーンをセットで管理
        const turrets = {
            '1': { root: null, barrels: null, angleY: 0, angleX: 0 },
            '2': { root: null, barrels: null, angleY: 0, angleX: 0 },
            '3': { root: null, barrels: null, angleY: 0, angleX: 0 },
            'sec1': { root: null, barrels: null, angleY: 0, angleX: 0 },
            'sec2': { root: null, barrels: null, angleY: 0, angleX: 0 }
        };

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 500000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            createStars();

            const manager = new THREE.LoadingManager();
            manager.setURLModifier(url => url.replace(/\+/g, '%2B'));
            const loader = new MMDLoader(manager);
            loader.setResourcePath('models/'); 

            loader.load('models/yamato.pmx', (mesh) => {
                yamato = mesh;
                scene.add(yamato);
                
                // ボーンの紐付け（モデルのボーン名に合わせて調整が必要な場合があります）
                yamato.skeleton.bones.forEach(bone => {
                    if (bone.name.includes("第一主砲")) turrets['1'].root = bone;
                    if (bone.name.includes("第二主砲")) turrets['2'].root = bone;
                    if (bone.name.includes("第三主砲")) turrets['3'].root = bone;
                    if (bone.name.includes("第一副砲")) turrets['sec1'].root = bone;
                    if (bone.name.includes("第二副砲")) turrets['sec2'].root = bone;
                    
                    // 砲身（上下）ボーンの検索
                    if (bone.name.includes("砲身")) {
                        if (bone.name.includes("第一主砲")) turrets['1'].barrels = bone;
                        if (bone.name.includes("第二主砲")) turrets['2'].barrels = bone;
                        if (bone.name.includes("第三主砲")) turrets['3'].barrels = bone;
                        if (bone.name.includes("第一副砲")) turrets['sec1'].barrels = bone;
                        if (bone.name.includes("第二副砲")) turrets['sec2'].barrels = bone;
                    }
                });

                document.getElementById('loading').style.display = 'none';
            }, (xhr) => {
                document.getElementById('progress').innerText = Math.round(xhr.loaded / xhr.total * 100) + "%";
            });

            // --- イベントリスナー ---
            window.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            });

            // スクロール操作
            window.addEventListener('wheel', (e) => {
                if (selectedTurret) {
                    // 砲塔選択中：仰角を動かす
                    turrets[selectedTurret].angleX += e.deltaY * 0.0005;
                    turrets[selectedTurret].angleX = Math.max(-0.5, Math.min(0.1, turrets[selectedTurret].angleX));
                } else {
                    // 未選択時：ズーム
                    camDist += e.deltaY * 0.5;
                    camDist = Math.max(300, Math.min(5000, camDist));
                }
            });

            // 砲塔選択ボタン
            document.querySelectorAll('.t-btn[data-id]').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedTurret = btn.dataset.id;
                };
            });
            document.getElementById('btn-clear').onclick = () => {
                document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
                selectedTurret = null;
            };

            // 武器選択ボタン
            document.getElementById('w-shock').onclick = () => {
                weaponType = 'shock';
                document.getElementById('w-shock').classList.add('selected');
                document.getElementById('w-fusion').classList.remove('selected');
            };
            document.getElementById('w-fusion').onclick = () => {
                weaponType = 'fusion';
                document.getElementById('w-fusion').classList.add('selected');
                document.getElementById('w-shock').classList.remove('selected');
            };

            document.getElementById('fire-btn').onclick = fire;
            window.addEventListener('keydown', (e) => { if(e.code === 'KeyF') fire(); });
        }

        function fire() {
            if (!yamato) return;
            const targetIDs = selectedTurret ? [selectedTurret] : ['1', '2', '3']; // 未選択時は全主砲

            targetIDs.forEach(id => {
                const turret = turrets[id];
                if (!turret.root) return;

                let geo, mat;
                if (weaponType === 'shock') {
                    geo = new THREE.CylinderGeometry(2, 2, 200, 8);
                    geo.rotateX(Math.PI / 2);
                    mat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 });
                } else {
                    geo = new THREE.SphereGeometry(8, 8, 8);
                    mat = new THREE.MeshLambertMaterial({ color: 0xff4400, emissive: 0xff2200 });
                }

                const bullet = new THREE.Mesh(geo, mat);
                const worldPos = new THREE.Vector3();
                const worldQuat = new THREE.Quaternion();
                
                // 砲身の先から出す
                const targetBone = turret.barrels || turret.root;
                targetBone.getWorldPosition(worldPos);
                targetBone.getWorldQuaternion(worldQuat);
                
                bullet.position.copy(worldPos);
                bullet.quaternion.copy(worldQuat);
                bullet.translateZ(-50);
                
                bullet.userData.velocity = weaponType === 'shock' ? 80 : 30;
                bullet.userData.life = 100;
                bullets.push(bullet);
                scene.add(bullet);
            });
        }

        function createStars() {
            const vertices = [];
            for (let i = 0; i < 10000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(100000));
                vertices.push(THREE.MathUtils.randFloatSpread(100000));
                vertices.push(THREE.MathUtils.randFloatSpread(100000));
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            scene.add(new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0xffffff, size: 4 })));
        }

        function animate() {
            requestAnimationFrame(animate);
            if (yamato) {
                // 主砲の動き
                Object.keys(turrets).forEach(id => {
                    const t = turrets[id];
                    if (t.root) {
                        // 旋回（左右）
                        if (selectedTurret === id) {
                            t.angleY = THREE.MathUtils.lerp(t.angleY, -mouseX * Math.PI, 0.05);
                        }
                        t.root.rotation.y = t.angleY;
                    }
                    if (t.barrels) {
                        // 仰角（上下）
                        t.barrels.rotation.x = t.angleX;
                    }
                });

                // カメラ追従
                const cameraOffset = new THREE.Vector3(0, 200, camDist).applyMatrix4(yamato.matrixWorld);
                camera.position.lerp(cameraOffset, 0.1);
                camera.lookAt(yamato.position);
            }

            // 弾の更新
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.translateZ(-b.userData.velocity);
                b.userData.life--;
                if (b.userData.life <= 0) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
