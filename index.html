<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>宇宙戦艦ヤマト Web Game - パス修正版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #gui { position: absolute; top: 10px; left: 10px; color: #00ff00; font-family: monospace; pointer-events: none; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="loading">ヤマト発進準備中...</div>
    <div id="gui">
        WASD: 移動 | 矢印キー: 旋回<br>
        SPACE: 加速 | SHIFT: 減速<br>
        <div id="debug" style="color: red;"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';

        let scene, camera, renderer, yamato;
        const keys = {};
        let speed = 0;

        // ★★★ 【ここをGitHubのフォルダ構成に合わせて書き換えてください】 ★★★
        // 1. もし models フォルダの中なら 'models/yamato.pmx'
        // 2. もし index.html と同じ場所なら 'yamato.pmx'
        const MODEL_PATH = 'models/yamato.pmx'; 

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200000);
            camera.position.set(0, 100, 500);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            createStars();

            const loader = new MMDLoader();
            console.log("読み込み開始:", MODEL_PATH);

            loader.load(MODEL_PATH, (mesh) => {
                yamato = mesh;
                scene.add(yamato);
                document.getElementById('loading').style.display = 'none';
            }, 
            (xhr) => {
                const percent = Math.round(xhr.loaded / xhr.total * 100);
                document.getElementById('loading').innerText = `読み込み中: ${percent}%`;
            }, 
            (error) => {
                console.error("エラー詳細:", error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('debug').innerText = 
                    `エラー: ${MODEL_PATH} が見つかりません。\nGitHubのフォルダ名を確認してください。`;
            });

            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);
            window.addEventListener('resize', onWindowResize);
        }

        function createStars() {
            const vertices = [];
            for (let i = 0; i < 5000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(10000));
                vertices.push(THREE.MathUtils.randFloatSpread(10000));
                vertices.push(THREE.MathUtils.randFloatSpread(10000));
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            scene.add(new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0xffffff, size: 2 })));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (yamato) {
                if (keys['Space']) speed += 0.2;
                if (keys['ShiftLeft']) speed -= 0.2;
                speed *= 0.95; 
                yamato.translateZ(-speed);
                if (keys['ArrowLeft']) yamato.rotation.y += 0.03;
                if (keys['ArrowRight']) yamato.rotation.y -= 0.03;
                if (keys['ArrowUp']) yamato.rotation.x -= 0.02;
                if (keys['ArrowDown']) yamato.rotation.x += 0.02;
                
                const relativeCameraOffset = new THREE.Vector3(0, 150, 600);
                const cameraOffset = relativeCameraOffset.applyMatrix4(yamato.matrixWorld);
                camera.position.lerp(cameraOffset, 0.1);
                camera.lookAt(yamato.position);
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
