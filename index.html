<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>宇宙戦艦ヤマト Web Game - ズーム機能搭載版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #gui { position: absolute; top: 10px; left: 10px; color: #00ff00; font-family: monospace; pointer-events: none; text-shadow: 1px 1px 2px black; line-height: 1.5; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: sans-serif; font-size: 20px; }
    </style>
</head>
<body>
    <div id="loading">ヤマト発進準備中...</div>
    <div id="gui">
        WASD: 移動 | 矢印キー: 旋回<br>
        SPACE: 加速 | SHIFT: 減速<br>
        Q: ズームアップ(接近) | E: ズームバック(離れる)
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';

        let scene, camera, renderer, yamato;
        const keys = {};
        let speed = 0;

        // --- 【カメラ距離の設定変数】 ---
        let camDist = 600;  // 後ろの距離 (初期値)
        let camHeight = 150; // 高さ (初期値)

        // 前回の成功に合わせてパスを指定（必要なら 'models/yamato.pmx' に書き換えてください）
        const MODEL_PATH = 'models/yamato.pmx'; 

        init();
        animate();

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 光源
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(ambientLight);
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(100, 500, 100);
            scene.add(sun);

            // 星空
            createStars();

            // MMD読み込み
            const loader = new MMDLoader();
            loader.load(MODEL_PATH, (mesh) => {
                yamato = mesh;
                scene.add(yamato);
                document.getElementById('loading').style.display = 'none';
            }, 
            (xhr) => {
                const percent = Math.round(xhr.loaded / xhr.total * 100);
                document.getElementById('loading').innerText = `読み込み中: ${percent}%`;
            }, 
            (error) => {
                console.error("ロードエラー:", error);
                document.getElementById('loading').innerText = "モデルが見つかりません。パスを確認してください。";
            });

            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);
            window.addEventListener('resize', onWindowResize);
        }

        function createStars() {
            const vertices = [];
            for (let i = 0; i < 10000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(15000));
                vertices.push(THREE.MathUtils.randFloatSpread(15000));
                vertices.push(THREE.MathUtils.randFloatSpread(15000));
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            scene.add(new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0xffffff, size: 2 })));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (yamato) {
                // 移動ロジック
                if (keys['Space']) speed += 0.2;
                if (keys['ShiftLeft']) speed -= 0.2;
                speed *= 0.96; 
                yamato.translateZ(-speed);

                // 旋回ロジック
                if (keys['ArrowLeft']) yamato.rotation.y += 0.03;
                if (keys['ArrowRight']) yamato.rotation.y -= 0.03;
                if (keys['ArrowUp']) yamato.rotation.x -= 0.015;
                if (keys['ArrowDown']) yamato.rotation.x += 0.015;
                
                // WASD平行移動
                if (keys['KeyA']) yamato.translateX(5);
                if (keys['KeyD']) yamato.translateX(-5);
                if (keys['KeyW']) yamato.translateY(5);
                if (keys['KeyS']) yamato.translateY(-5);

                // --- 【追加機能：ズームアップ・クローズ】 ---
                if (keys['KeyQ']) { // Close (アップ)
                    camDist -= 10;
                    camHeight -= 2.5;
                }
                if (keys['KeyE']) { // Up (離れる)
                    camDist += 10;
                    camHeight += 2.5;
                }
                // 埋まり防止の制限 (最小距離 150)
                camDist = Math.max(150, camDist);
                camHeight = Math.max(40, camHeight);

                // カメラの追従計算
                const relativeCameraOffset = new THREE.Vector3(0, camHeight, camDist);
                const cameraOffset = relativeCameraOffset.applyMatrix4(yamato.matrixWorld);
                camera.position.lerp(cameraOffset, 0.1);
                camera.lookAt(yamato.position);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
