<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宇宙戦艦ヤマト Web Game - 復活版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #gui { position: absolute; top: 10px; left: 10px; color: #00ff00; font-family: monospace; pointer-events: none; text-shadow: 1px 1px 2px black; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="loading">ヤマト発進準備中...</div>
    <div id="gui">
        WASD: 移動 | 矢印キー: 旋回<br>
        SPACE: 加速 | SHIFT: 減速<br>
        <span id="pos-display">位置: 推定中</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';

        let scene, camera, renderer, yamato;
        const keys = {};
        let speed = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();

            // --- 【調整ポイント1：カメラの見える距離】 ---
            // 第3引数を 0.1 にして、近くにあるものも見えるようにしました。
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200000);
            // 最初は少し離れた場所にカメラを置く
            camera.position.set(0, 100, 300);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(ambientLight);
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(100, 500, 100);
            scene.add(sun);

            createStars();

            const loader = new MMDLoader();
            loader.load('yamato.pmx', (mesh) => {
                yamato = mesh;
                
                // --- 【調整ポイント2：もしヤマトが小さすぎたら】 ---
                // もし何も見えない場合は、下の 1 を 10 などに変えてみてください
                yamato.scale.set(1, 1, 1); 
                
                scene.add(yamato);
                document.getElementById('loading').style.display = 'none';
            }, 
            (xhr) => {
                const percent = Math.round(xhr.loaded / xhr.total * 100);
                document.getElementById('loading').innerText = `読み込み中: ${percent}%`;
            }, 
            (error) => {
                console.error("エラー:", error);
                document.getElementById('loading').innerText = "読み込み失敗。ファイル名を確認してください。";
            });

            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);
            window.addEventListener('resize', onWindowResize);
        }

        function createStars() {
            const vertices = [];
            for (let i = 0; i < 10000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(15000));
                vertices.push(THREE.MathUtils.randFloatSpread(15000));
                vertices.push(THREE.MathUtils.randFloatSpread(15000));
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            const material = new THREE.PointsMaterial({ color: 0xffffff, size: 2 });
            scene.add(new THREE.Points(geometry, material));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (yamato) {
                // スピード調整
                if (keys['Space']) speed += 0.2;
                if (keys['ShiftLeft']) speed -= 0.2;
                speed *= 0.95; 

                // 移動
                yamato.translateZ(-speed);

                // 回転
                if (keys['ArrowLeft']) yamato.rotation.y += 0.03;
                if (keys['ArrowRight']) yamato.rotation.y -= 0.03;
                if (keys['ArrowUp']) yamato.rotation.x -= 0.02;
                if (keys['ArrowDown']) yamato.rotation.x += 0.02;
                
                // WASD平行移動
                if (keys['KeyA']) yamato.translateX(5);
                if (keys['KeyD']) yamato.translateX(-5);
                if (keys['KeyW']) yamato.translateY(5);
                if (keys['KeyS']) yamato.translateY(-5);

                // --- 【調整ポイント3：カメラの追従位置】 ---
                // 第2引数：高さ（150） / 第3引数：後ろの距離（600）
                // ヤマトが巨大なら、この600を 1500 くらいまで大きくしてください
                const relativeCameraOffset = new THREE.Vector3(0, 150, 600);

                const cameraOffset = relativeCameraOffset.applyMatrix4(yamato.matrixWorld);
                
                // lerpの第2引数を 1 にすると、遊びがなくなり「完全に固定」されます
                // 画面がガクガクする場合は 0.1 くらいにしてください
                camera.position.lerp(cameraOffset, 1); 
                camera.lookAt(yamato.position);

                // デバッグ用に現在の位置を表示
                document.getElementById('pos-display').innerText = 
                    `ヤマト位置: x:${Math.round(yamato.position.x)} y:${Math.round(yamato.position.y)} z:${Math.round(yamato.position.z)}`;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
