<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Space Battleship - Tactical Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #00ffea; font-family: 'Courier New', monospace; user-select: none; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        #turret-selector { 
            position: absolute; 
            left: 20px; 
            top: 20px; 
            bottom: 80px; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            pointer-events: auto; 
            overflow-y: auto; 
            padding-right: 10px;
        }
        #turret-selector::-webkit-scrollbar { width: 6px; }
        #turret-selector::-webkit-scrollbar-thumb { background: #00ffea; border-radius: 3px; }
        #turret-selector::-webkit-scrollbar-track { background: rgba(0,20,30,0.5); }

        .ui-btn { background: rgba(0, 20, 30, 0.85); border: 1px solid #00ffea; color: #00ffea; padding: 10px 15px; cursor: pointer; text-align: left; min-width: 180px; font-weight: bold; font-family: inherit; transition: all 0.2s; box-shadow: 0 0 10px rgba(0,255,234,0.1); }
        .ui-btn:hover { background: rgba(0, 255, 234, 0.2); box-shadow: 0 0 15px rgba(0,255,234,0.4); }
        .active { background: #00ffea !important; color: #000 !important; box-shadow: 0 0 20px #00ffea !important; }

        #info-panel { position: absolute; top: 20px; right: 20px; background: rgba(0,10,20,0.8); padding: 15px; border: 1px solid #00ffea; border-radius: 4px; pointer-events: none; min-width: 200px; line-height: 1.5; }
        
        #bottom { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 14px; text-shadow: 0 0 5px #00ffea; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: #00ffea; font-weight: bold; letter-spacing: 2px; }
        
        #reticle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 2px solid #00ffea; border-radius: 50%; display: none; pointer-events: none; }
        #reticle::before { content: ''; position: absolute; top: 50%; left: -10px; width: 60px; height: 2px; background: #00ffea; transform: translateY(-50%); }
        #reticle::after { content: ''; position: absolute; left: 50%; top: -10px; width: 2px; height: 60px; background: #00ffea; transform: translateX(-50%); }
    </style>
</head>
<body>

<div id="loading">TACTICAL SYSTEM INITIALIZING...</div>

<div id="ui">
    <div id="info-panel">
        <div style="font-size: 16px; font-weight: bold; border-bottom: 1px solid #00ffea; padding-bottom: 5px; margin-bottom: 8px;">SYSTEM STATUS</div>
        STATUS: <span style="color:#0f0;">ONLINE</span><br>
        SPEED: <span id="speed-val">0</span> kn<br>
        WEAPON: <span id="ammo-val">ショックカノン</span><br>
        TARGETS: <span id="target-count">0</span>
    </div>

    <div id="turret-selector">
        <button class="ui-btn active" id="btn-none">航行モード (自由視点)</button>
    </div>

    <div id="reticle"></div>

    <div id="bottom">
        [W/S] 前進/後進 | [A/D] 旋回 | [縦スクロール] 砲身上下 | [横スクロール] 砲塔旋回 | [F] 砲撃 | [X] 兵装切替
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';

    let scene, camera, renderer, yamato;
    let speed = 0, camDist = 2500;
    const keys = {};
    const bullets = [];
    const targets = [];
    const particles = []; 
    
    let turrets = []; 
    let activeIdx = -1;
    let ammoType = 0; 

    // 各砲塔の角度データ管理
    let turretAngles = [];

    // ボーン名から「何番目の主砲/副砲か」を判定するヘルパー関数
    function getTurretGroup(name) {
        const isSub = name.includes("副");
        if (name.includes("1") || name.includes("１") || name.includes("一")) return { num: 1, type: isSub ? "sub" : "main", label: isSub ? "第一副砲" : "第一主砲" };
        if (name.includes("2") || name.includes("２") || name.includes("二")) return { num: 2, type: isSub ? "sub" : "main", label: isSub ? "第二副砲" : "第二主砲" };
        if (name.includes("3") || name.includes("３") || name.includes("三")) return { num: 3, type: isSub ? "sub" : "main", label: isSub ? "第三副砲" : "第三主砲" };
        return null;
    }

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(2000, 4000, 2000);
        scene.add(sun);

        createStars();
        spawnTargets(40); 

        const manager = new THREE.LoadingManager();
        manager.setURLModifier(url => url.replace(/\+/g, '%2B'));
        const loader = new MMDLoader(manager);
        loader.setResourcePath('models/'); 

        loader.load('models/yamato.pmx', (mesh) => {
            yamato = mesh;
            yamato.scale.set(25, 25, 25); 
            // モデルの前後逆を修正
            yamato.rotation.y = Math.PI;
            scene.add(yamato);
            
            const btnContainer = document.getElementById('turret-selector');
            const sortedBases = [];

            // 1. 賢いボーンスキャン（パーツの枝葉を弾き、主要5基の土台だけを抽出）
            yamato.skeleton.bones.forEach((bone) => {
                const n = bone.name;
                // 砲塔の土台ボーンになり得るキーワードをチェック
                if (n.includes("砲") || n.includes("塔") || n.includes("Turret")) {
                    // 枝葉パーツ（身、先、穴、A,B,C,プラス記号など）を除外して土台を特定
                    if (!n.includes("身") && !n.includes("先") && !n.includes("穴") && !n.includes("+") && !/=[A-Z]/i.test(n)) {
                        const group = getTurretGroup(n);
                        if (group) {
                            // 3番目の副砲など、不要なものは除外（主要5門に絞る）
                            if (group.type === "sub" && group.num > 2) return;

                            sortedBases.push({
                                rawName: n,
                                group: group,
                                base: bone,
                                barrels: []
                            });
                        }
                    }
                }
            });

            // 表示順を「第一主砲、第二主砲、第三主砲、第一副砲、第二副砲」の順にソート
            sortedBases.sort((a, b) => {
                if (a.group.type !== b.group.type) return a.group.type === "main" ? -1 : 1;
                return a.group.num - b.group.num;
            });

            // 2. 土台に紐づく砲身（上下パーツ）をグループ情報から再連結
            sortedBases.forEach((data) => {
                yamato.skeleton.bones.forEach(b => {
                    const bGroup = getTurretGroup(b.name);
                    // 同じ番号・同じ種別（主砲/副砲）で、かつ「身」や「A/B/C」などの砲身パーツを収集
                    if (bGroup && bGroup.type === data.group.type && bGroup.num === data.group.num) {
                        if (b.name.includes("身") || b.name.includes("先") || /[A-C]$/.test(b.name)) {
                            if (b !== data.base) data.barrels.push(b);
                        }
                    }
                });

                // データの登録とボタン生成
                const idx = turrets.length;
                turrets.push(data);
                turretAngles.push({ yaw: 0, pitch: 0 });

                const btn = document.createElement('button');
                btn.className = 'ui-btn';
                btn.innerText = data.group.label; // 「第一主砲」などの綺麗な名前
                btn.onclick = () => selectTurret(idx, btn);
                btnContainer.appendChild(btn);
            });

            document.getElementById('btn-none').onclick = () => selectTurret(-1, document.getElementById('btn-none'));
            document.getElementById('loading').style.display = 'none';
        }, onprogress, (err) => {
            console.warn("MMDモデルが配置されていません。モックの宇宙船を生成します。");
            createDummyShip();
        });

        // ホイールによる直感操作
        window.addEventListener('wheel', (e) => {
            if (activeIdx !== -1 && turrets[activeIdx]) {
                // 横スクロール（deltaX）で砲塔左右旋回
                turretAngles[activeIdx].yaw -= e.deltaX * 0.002;
                
                // 縦スクロール（deltaY）で砲身上下（仰角・俯角）
                turretAngles[activeIdx].pitch -= e.deltaY * 0.002;
                // 砲身が曲がりすぎないように制限
                turretAngles[activeIdx].pitch = Math.max(-0.05, Math.min(0.7, turretAngles[activeIdx].pitch));
            } else {
                camDist = Math.max(500, Math.min(10000, camDist + e.deltaY * 2));
            }
        }, { passive: true });

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'KeyX') switchAmmo();
            if(e.code === 'KeyF') fire();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('resize', onWindowResize);
    }

    function onprogress(xhr) {
        if (xhr.lengthComputable) {
            const percentComplete = xhr.loaded / xhr.total * 100;
            document.getElementById('loading').innerText = `LOADING MODEL: ${Math.round(percentComplete)}%`;
        }
    }

    function createDummyShip() {
        document.getElementById('loading').style.display = 'none';
        const geo = new THREE.ConeGeometry(50, 300, 4);
        geo.rotateX(Math.PI / 2);
        const mat = new THREE.MeshStandardMaterial({ color: 0x445566 });
        yamato = new THREE.Mesh(geo, mat);
        scene.add(yamato);
        
        const dummyNames = ["第一主砲", "第二主砲", "第三主砲", "第一副砲", "第二副砲"];
        dummyNames.forEach((name, idx) => {
            const mockTurret = new THREE.Group();
            mockTurret.position.set(0, 30, 100 - idx * 50);
            yamato.add(mockTurret);
            
            const mockBarrel = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 60), new THREE.MeshBasicMaterial({color:0x00ffea}));
            mockBarrel.position.set(0, 0, 30);
            mockBarrel.rotateX(Math.PI/2);
            mockTurret.add(mockBarrel);

            turrets.push({ base: mockTurret, barrels: [mockBarrel] });
            turretAngles.push({ yaw: 0, pitch: 0 });

            const btn = document.createElement('button');
            btn.className = 'ui-btn';
            btn.innerText = name;
            btn.onclick = () => selectTurret(idx, btn);
            document.getElementById('turret-selector').appendChild(btn);
        });
    }

    function selectTurret(idx, btn) {
        activeIdx = idx;
        document.querySelectorAll('.ui-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('reticle').style.display = idx === -1 ? 'none' : 'block';
    }

    function switchAmmo() {
        ammoType = (ammoType + 1) % 2;
        document.getElementById('ammo-val').innerText = ammoType === 0 ? "ショックカノン" : "三式融合弾";
        document.getElementById('ammo-val').style.color = ammoType === 0 ? "#00ffff" : "#ffaa00";
    }

    function fire() {
        if (!yamato) return;
        const targetTurrets = activeIdx === -1 ? turrets : [turrets[activeIdx]];
        
        targetTurrets.forEach(t => {
            const shootPoints = t.barrels.length > 0 ? t.barrels : [t.base];
            shootPoints.forEach(p => {
                const isShock = (ammoType === 0);
                const geo = isShock ? new THREE.CylinderGeometry(4, 4, 250, 8) : new THREE.SphereGeometry(20, 8, 8);
                if(isShock) geo.rotateX(Math.PI/2);
                
                const mat = new THREE.MeshBasicMaterial({
                    color: isShock ? 0x00ffff : 0xffaa00,
                    transparent: true,
                    opacity: 0.9
                });
                
                const bullet = new THREE.Mesh(geo, mat);
                const worldPos = new THREE.Vector3();
                const worldQuat = new THREE.Quaternion();
                
                p.getWorldPosition(worldPos);
                p.getWorldQuaternion(worldQuat);
                
                bullet.position.copy(worldPos);
                bullet.quaternion.copy(worldQuat);
                
                const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(worldQuat).normalize();
                
                bullet.userData = { 
                    life: 120, 
                    vel: dir.multiplyScalar(isShock ? 350 : 180), 
                    type: ammoType 
                };
                bullets.push(bullet);
                scene.add(bullet);
            });
        });
    }

    function spawnTargets(count) {
        const geo = new THREE.IcosahedronGeometry(60, 1);
        const mat = new THREE.MeshStandardMaterial({ color: 0xff3344, roughness: 0.8, metalness: 0.2 });
        
        for (let i = 0; i < count; i++) {
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(
                THREE.MathUtils.randFloatSpread(30000),
                THREE.MathUtils.randFloatSpread(10000),
                THREE.MathUtils.randFloatSpread(30000) + 15000 
            );
            scene.add(mesh);
            targets.push(mesh);
        }
        document.getElementById('target-count').innerText = targets.length;
    }

    function createExplosion(pos, colorHex) {
        const pCount = 30;
        const geom = new THREE.BufferGeometry();
        const positions = [];
        const velocities = [];

        for(let i=0; i<pCount; i++) {
            positions.push(pos.x, pos.y, pos.z);
            velocities.push(
                THREE.MathUtils.randFloatSpread(40),
                THREE.MathUtils.randFloatSpread(40),
                THREE.MathUtils.randFloatSpread(40)
            );
        }

        geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        const mat = new THREE.PointsMaterial({color: colorHex, size: 25, transparent: true, opacity: 1.0, blending: THREE.AdditiveBlending});
        const pSystem = new THREE.Points(geom, mat);
        
        pSystem.userData = { velocities: velocities, life: 30 };
        particles.push(pSystem);
        scene.add(pSystem);
    }

    function createStars() {
        const v = [];
        for(let i=0; i<15000; i++) v.push(THREE.MathUtils.randFloatSpread(300000),THREE.MathUtils.randFloatSpread(300000),THREE.MathUtils.randFloatSpread(300000));
        const g = new THREE.BufferGeometry();
        g.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
        scene.add(new THREE.Points(g, new THREE.PointsMaterial({color:0xffffff, size:15})));
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        
        if (yamato) {
            if (keys['KeyW']) speed += 1.2;
            if (keys['KeyS']) speed -= 1.2;
            speed *= 0.97;
            yamato.translateZ(speed); 
            
            if (keys['KeyA']) yamato.rotation.y += 0.012;
            if (keys['KeyD']) yamato.rotation.y -= 0.012;
            document.getElementById('speed-val').innerText = Math.round(speed * 10);

            // 角度の同期
            turrets.forEach((t, idx) => {
                t.base.rotation.y = THREE.MathUtils.lerp(t.base.rotation.y, turretAngles[idx].yaw, 0.1);
                t.barrels.forEach(b => {
                    b.rotation.x = THREE.MathUtils.lerp(b.rotation.x, turretAngles[idx].pitch, 0.1);
                });
            });

            if (activeIdx === -1) {
                const offset = new THREE.Vector3(0, 600, -camDist).applyMatrix4(yamato.matrixWorld);
                camera.position.lerp(offset, 0.08);
                camera.lookAt(yamato.position.clone().add(new THREE.Vector3(0, 100, 500).applyQuaternion(yamato.quaternion)));
            } else {
                const base = turrets[activeIdx].base;
                const offset = new THREE.Vector3(0, 120, -450).applyMatrix4(base.matrixWorld);
                camera.position.lerp(offset, 0.15);
                
                const look = new THREE.Vector3(0, turretAngles[activeIdx].pitch * 1000, 3000).applyMatrix4(base.matrixWorld);
                camera.lookAt(look);
            }
        }

        for(let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.position.add(b.userData.vel);
            
            if(b.userData.type === 1) b.userData.vel.y -= 0.5;

            let hit = false;
            for(let j = targets.length - 1; j >= 0; j--) {
                const t = targets[j];
                const dist = b.position.distanceTo(t.position);
                if(dist < 120) { 
                    createExplosion(t.position, b.userData.type === 0 ? 0x00ffff : 0xffaa00);
                    scene.remove(t);
                    targets.splice(j, 1);
                    document.getElementById('target-count').innerText = targets.length;
                    hit = true;
                    break;
                }
            }

            if(hit || --b.userData.life <= 0) { 
                scene.remove(b); 
                bullets.splice(i, 1); 
            }
        }

        for(let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            const posAttr = p.geometry.attributes.position;
            const v = p.userData.velocities;
            
            for(let j = 0; j < posAttr.count; j++) {
                posAttr.setX(j, posAttr.getX(j) + v[j*3]);
                posAttr.setY(j, posAttr.getY(j) + v[j*3+1]);
                posAttr.setZ(j, posAttr.getZ(j) + v[j*3+2]);
            }
            posAttr.needsUpdate = true;
            p.material.opacity = p.userData.life / 30;

            if(--p.userData.life <= 0) {
                scene.remove(p);
                particles.splice(i, 1);
            }
        }

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
